name: Update REST API stable contract

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to update
        required: true
        default: main

permissions:
  contents: write
  pull-requests: write

jobs:
  update-rest-api-contract:
    if: ${{ github.repository_owner == 'bitfocus' }}

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
          ref: ${{ inputs.target_branch }}
          token: ${{ secrets.SYNC_MODULES_PAT }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Setup environment
        run: |
          corepack enable
          yarn config set httpTimeout 100000
          yarn install --immutable

      - name: Update stable contract
        run: |
          yarn rest-api:update-stable-contract

      - name: Run compatibility test
        run: |
          yarn vitest run companion/test/Service/RestApi/OpenApiCompatibility.test.ts --project companion

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: update REST API stable contract"
          title: "chore: update REST API stable contract"
          body: "This PR updates the committed OpenAPI stable contract used by the REST API backwards compatibility test."
          delete-branch: true
          branch: "chore/update-rest-api-contract"
          committer: "Companion Bot <companion-module-bot@users.noreply.github.com>"
          author: "Companion Bot <companion-module-bot@users.noreply.github.com>"
          add-paths: |
            companion/test/Service/RestApi/contracts/openapi-stable.json
          token: ${{ secrets.SYNC_MODULES_PAT }}
